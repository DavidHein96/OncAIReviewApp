name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: python -m pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --name PathReviewInstallTest app.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: PathReviewInstallTest-windows
          path: dist/PathReviewInstallTest.exe
