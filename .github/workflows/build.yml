name: Build standalone executables

# Builds a single-file executable for each platform. Runs on demand (Actions
# tab → Run workflow) and automatically when a GitHub Release is created — in
# which case the per-platform binaries are attached to that release.
on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:
    # Needed so the release-asset upload can write to the release.
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
            data: "web;web" # PyInstaller uses ';' as the path separator on Windows
            binary: oncai-review.exe
            asset: oncai-review-windows-x64.exe
          - os: ubuntu-latest
            label: linux-x64
            data: "web:web" # ...and ':' everywhere else
            binary: oncai-review
            asset: oncai-review-linux-x64
          - os: macos-latest
            label: macos-arm64 # macos-latest runners are Apple Silicon (arm64)
            data: "web:web"
            binary: oncai-review
            asset: oncai-review-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: python -m pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --name oncai-review --add-data "${{ matrix.data }}" server.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oncai-review-${{ matrix.label }}
          path: dist/${{ matrix.binary }}

      - name: Attach binary to the release
        if: github.event_name == 'release'
        # `cp` works in both bash (Linux/macOS) and PowerShell (Windows).
        run: |
          cp dist/${{ matrix.binary }} ${{ matrix.asset }}
          gh release upload ${{ github.event.release.tag_name }} ${{ matrix.asset }} --clobber
        env:
          GH_TOKEN: ${{ github.token }}
