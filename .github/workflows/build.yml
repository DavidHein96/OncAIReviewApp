name: Build standalone executables

# Manual only — builds a single-file executable for each platform and uploads
# them as workflow artifacts. Trigger from the Actions tab → Run workflow.
on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
            data: "web;web"          # PyInstaller uses ';' as the path separator on Windows
            binary: oncai-review.exe
          - os: ubuntu-latest
            label: linux-x64
            data: "web:web"          # ...and ':' everywhere else
            binary: oncai-review
          - os: macos-latest
            label: macos-arm64       # macos-latest runners are Apple Silicon (arm64)
            data: "web:web"
            binary: oncai-review
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: python -m pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --name oncai-review --add-data "${{ matrix.data }}" server.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oncai-review-${{ matrix.label }}
          path: dist/${{ matrix.binary }}
