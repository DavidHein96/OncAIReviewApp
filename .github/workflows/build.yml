name: Build standalone executables

# Builds a single-file executable for each platform. Runs on demand (Actions
# tab → Run workflow) and automatically when a GitHub Release is created — in
# which case the per-platform binaries are attached to that release.
#
# Artifacts and release assets are named with the semantic version read from
# pyproject.toml (the single source of truth), e.g. oncai-review-0.2.0-linux-x64.
on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:
    # Needed so the release-asset upload can write to the release.
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
            data: "web;web" # PyInstaller uses ';' as the path separator on Windows
            meta: "pyproject.toml;." # bundle pyproject so the exe can report its version
            binary: oncai-review.exe
            ext: ".exe"
          - os: ubuntu-latest
            label: linux-x64
            data: "web:web" # ...and ':' everywhere else
            meta: "pyproject.toml:."
            binary: oncai-review
            ext: ""
          - os: macos-latest
            label: macos-arm64 # macos-latest runners are Apple Silicon (arm64)
            data: "web:web"
            meta: "pyproject.toml:."
            binary: oncai-review
            ext: ""
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read version from pyproject.toml
        id: ver
        shell: bash
        run: |
          v=$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Install PyInstaller
        run: python -m pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --name oncai-review --add-data "${{ matrix.data }}" --add-data "${{ matrix.meta }}" server.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oncai-review-${{ steps.ver.outputs.version }}-${{ matrix.label }}
          path: dist/${{ matrix.binary }}

      - name: Attach binary to the release
        if: github.event_name == 'release'
        # bash is available on all runners (incl. Windows), so the asset naming
        # is identical across platforms.
        shell: bash
        run: |
          asset="oncai-review-${{ steps.ver.outputs.version }}-${{ matrix.label }}${{ matrix.ext }}"
          cp "dist/${{ matrix.binary }}" "$asset"
          gh release upload "${{ github.event.release.tag_name }}" "$asset" --clobber
        env:
          GH_TOKEN: ${{ github.token }}
